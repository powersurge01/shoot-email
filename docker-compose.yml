services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: shoot_email
      POSTGRES_PASSWORD: shoot_email
      POSTGRES_DB: shoot_email
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoot_email -d shoot_email"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
